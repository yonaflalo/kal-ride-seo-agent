name: Kal Ride AI CMO Cycle

on:
  schedule:
    # רץ כל 4 שעות בשעות עגולות (0, 4, 8, 12, 16, 20 שעון UTC)
    # בישראל (קיץ) זה יוצא: 03:00, 07:00, 11:00, 15:00, 19:00, 23:00
    - cron: '0 */4 * * *'
  workflow_dispatch: # מאפשר הרצה ידנית בלחיצת כפתור

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 # התיקון הקריטי כאן! (setup-python)
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv supabase

      - name: Run AI Agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agent.py