name: Kal Ride Strategy Runner

on:
  schedule:
    # ימי ראשון וחמישי - ריצה מלאה (מאמר + פוסט) ב-07:00 UTC (09:00/10:00 ישראל)
    - cron: '0 7 * * 0,4'
    
    # ימי שלישי ושישי - רק פוסטים לרשתות (בשעה 08:00 ישראל לערך)
    - cron: '0 6 * * 2,5'
  
  workflow_dispatch: # מאפשר הרצה ידנית בלחיצת כפתור

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # הרצה מלאה: ימי ראשון וחמישי
      - name: Run Full Content Strategy (Sun, Thu)
        if: github.event.schedule == '0 7 * * 0,4' || github.event_name == 'workflow_dispatch'
        run: python agent.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}

      # הרצה של פוסט בלבד: ימי שלישי ושישי
      - name: Run Social Only Strategy (Tue, Fri)
        if: github.event.schedule == '0 6 * * 2,5'
        run: python agent.py --social-only
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}