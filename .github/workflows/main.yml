name: Kal Ride AI Automation

on:
  schedule:
    - cron: '0 */4 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch: 

jobs:
  run-automation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        # התיקון: שימוש בגרשיים בודדות מסביב לנתיב עם רווחים
        working-directory: 'seo agent/python_engine'
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase google-genai python-dotenv pytz

      - name: Run Social Engine
        working-directory: 'seo agent/python_engine'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python factory_ai_agents.py

      - name: Run SEO Engine
        if: github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch'
        working-directory: 'seo agent/python_engine'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python seo_factory.py