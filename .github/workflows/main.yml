name: Kal Ride AI Automation

on:
  schedule:
    - cron: '0 */4 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch: 

jobs:
  run-automation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Find Core Directory
        id: set-dir
        run: |
          # מוצא את התיקייה שבה נמצאים קבצי ה-Python
          TARGET_DIR=$(find . -name "factory_ai_agents.py" -exec dirname {} \; | head -n 1)
          echo "target_path=$TARGET_DIR" >> $GITHUB_OUTPUT
          echo "Found directory: $TARGET_DIR"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        working-directory: ${{ steps.set-dir.outputs.target_path }}
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase google-genai python-dotenv pytz

      - name: Run Social Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          IG_USER_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
        working-directory: ${{ steps.set-dir.outputs.target_path }}
        run: python factory_ai_agents.py

      - name: Run SEO Engine
        # מריץ רק אם השעה נכונה או אם לחצת ידנית
        if: github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        working-directory: ${{ steps.set-dir.outputs.target_path }}
        run: |
          # בדיקה אם הקובץ קיים לפני הרצה למניעת Error
          if [ -f "seo_factory.py" ]; then
            python seo_factory.py
          else
            echo "seo_factory.py not found in this directory, running secondary agent..."
            python factory_ai_agents.py
          fi