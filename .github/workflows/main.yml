name: Kal Ride AI Automation

on:
  schedule:
    - cron: '0 */4 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch: 

jobs:
  run-automation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        # שימוש ב-shell כדי לטפל בנתיב עם רווחים בצורה בטוחה
        run: |
          cd "seo agent/python_engine"
          python -m pip install --upgrade pip
          pip install requests supabase google-genai python-dotenv pytz

      - name: Run Social Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }} # השתמשתי בשם שיש לך בתמונה!
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          IG_USER_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
        run: |
          cd "seo agent/python_engine"
          python factory_ai_agents.py

      - name: Run SEO Engine
        if: github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }} # השתמשתי בשם שיש לך בתמונה!
        run: |
          cd "seo agent/python_engine"
          python seo_factory.py